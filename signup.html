<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nox - Signup</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="card">

    <h1 class="title">BECOME A SEEKER</h1>

    <input type="text" id="suName" placeholder="Username">
    <input type="email" id="suEmail" placeholder="Cosmic Email">
    <input type="password" id="suPass" placeholder="Password">

    <button id="signupBtn">AWAKEN</button>

    <p class="link">
      Already here? <span id="goLogin">Log In</span>
    </p>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
