<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nox - Login</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="background"></div>

<!-- CONSTELLATION -->
<div class="star-field">
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>
</div>

<div class="container">

  <div class="card">

    <!-- NOX HERO -->
    <div class="nox-hero">
      <img src="image/Nox.png" alt="Nox">
    </div>

    <h1 class="title">NOX</h1>
    <p class="subtitle">The Archive Awaits</p>

    <input type="text" id="email" placeholder="Email / Username">

    <div class="input-row">
      <input type="password" id="password" placeholder="Password">
      <i class="fa fa-lock"></i>
    </div>

    <button id="enterBtn">ENTER THE ARCHIVE</button>

    <p class="link">
      New here? <span id="goSignup">Awaken</span>
    </p>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
