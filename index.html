<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nox - Login</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="card">

    <h1 class="title">NOX</h1>
    <p class="subtitle">The Archive Awaits</p>

    <input id="loginEmail" type="text" placeholder="Email / Username">
    
    <div class="input-row">
      <input id="loginPassword" type="password" placeholder="Password">
      <i class="fa fa-lock"></i>
    </div>

    <button id="loginBtn">ENTER THE ARCHIVE</button>

    <p class="link">
      New here? <span id="goSignup">Awaken</span>
    </p>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
