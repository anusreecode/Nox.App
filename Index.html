<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nox Login</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

    <div class="nox-section">

        <div class="stars"></div>

        <img src="image/Nox.png" class="nox-img">

    </div>

    <div class="login-section">

        <h1>NOX</h1>

        <p class="subtitle">
            Ancient Celestial Librarian
        </p>

        <form id="loginForm">

            <input
            type="email"
            placeholder="Email Address"
            required>

            <input
            type="password"
            placeholder="Password"
            required>

            <button type="submit">
                Log In
            </button>

        </form>

        <button
        class="signup-btn"
        onclick="goSignup()">

        Sign Up

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
